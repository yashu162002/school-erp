spring.application.name=school-erp

# ===============================
# PostgreSQL Configuration
# ===============================

spring.datasource.url=jdbc:postgresql://localhost:5432/school_erp
spring.datasource.username=school_admin
spring.datasource.password=School@123
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# HikariCP Connection Pool
# ===============================

spring.datasource.hikari.pool-name=SchoolERP-HikariPool
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000
spring.datasource.hikari.connection-timeout=30000

# ===============================
# Hibernate / JPA
# ===============================

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=school_erp_schema

# ===============================
# JWT Configuration
# ===============================

jwt.secret=SchoolERPSecretKeySchoolERPSecretKey2026
jwt.expiration=86400000

# ===============================
# File Upload Configuration
# ===============================

file.upload-dir=uploads/students

spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===============================
# Server Configuration
# ===============================

server.port=8080
server.error.include-message=always
server.error.include-binding-errors=always

# ===============================
# Logging
# ===============================

logging.level.org.springframework.security=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE